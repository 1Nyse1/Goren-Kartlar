<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Sesli Soru Sistemi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            padding: 30px;
            background: #1e1e1e;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #4caf50; font-size: 24px; }
        #durum { font-size: 18px; color: #bbb; margin-top: 20px; }
        #süre { font-size: 48px; color: #ff9800; font-weight: bold; margin: 20px 0; }
        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="baslik">Soru Yükleniyor...</h1>
    <div id="durum">Lütfen bekleyin...</div>
    <div id="süre"></div>
    
    <button id="baslatBtn" style="display:none;" onclick="oyunuBaslat()">Oyunu Başlat</button>
</div>

<script>
// 1. MP3 HAVUZU (ElevenLabs'ten indirdiğiniz dosya isimleri)
const soruHavuzu = {
    kitap: [
        { soruSes: "kitapsoru1.mp3", cevapSes: "kitapcevap1.mp3" },
        { soruSes: "kitapsoru2.mp3", cevapSes: "kitapcevap2.mp3" },
        { soruSes: "kitapsoru3.mp3", cevapSes: "kitapcevap3.mp3" },
        { soruSes: "kitapsoru4.mp3", cevapSes: "kitapcevap4.mp3" },
        { soruSes: "kitapsoru5.mp3", cevapSes: "kitapcevap5.mp3" },
        { soruSes: "kitapsoru6.mp3", cevapSes: "kitapcevap6.mp3" },
        { soruSes: "kitapsoru7.mp3", cevapSes: "kitapcevap7.mp3" },
        { soruSes: "kitapsoru8.mp3", cevapSes: "kitapcevap8.mp3" },
        { soruSes: "kitapsoru9.mp3", cevapSes: "kitapcevap9.mp3" },
        { soruSes: "kitapsoru10.mp3", cevapSes: "kitapcevap10.mp3" },
        { soruSes: "kitapsoru11.mp3", cevapSes: "kitapcevap11.mp3" },
        { soruSes: "kitapsoru12.mp3", cevapSes: "kitapcevap12.mp3" },
        { soruSes: "kitapsoru13.mp3", cevapSes: "kitapcevap13.mp3" }
        // Kaç adet kitap sorunuz varsa buraya bu formatta ekleyebilirsiniz...
    ],
    siir: [
        { soruSes: "siirsoru1.mp3", cevapSes: "siircevap1.mp3" },
        { soruSes: "siirsoru2.mp3", cevapSes: "siircevap2.mp3" },
        { soruSes: "siirsoru3.mp3", cevapSes: "siircevap3.mp3" },
        { soruSes: "siirsoru4.mp3", cevapSes: "siircevap4.mp3" },
        { soruSes: "siirsoru5.mp3", cevapSes: "siircevap5.mp3" },
        { soruSes: "siirsoru6.mp3", cevapSes: "siircevap6.mp3" },
        { soruSes: "siirsoru7.mp3", cevapSes: "siircevap7.mp3" },
        { soruSes: "siirsoru8.mp3", cevapSes: "siircevap8.mp3" },
        { soruSes: "siirsoru9.mp3", cevapSes: "siircevap9.mp3" }
        // Şiir soruları...
    ],
    sarki: [
    { 
        genelSoruSes: "sarki-sorusu.mp3", // ElevenLabs'ten indirdiğiniz "şarkı kime ait" sorusu
        soruSes: "tarkan-simarik.mp3",       // Kestiğiniz 10-15 saniyelik şarkı kesiti
        cevapSes: "sarkicevap1.mp3"        // ElevenLabs'ten indirdiğiniz "Doğru cevap Tarkan Şımarık" sesi
    },
    { 
        genelSoruSes: "sarki-sorusu.mp3",
        soruSes: "aleynatilki-senolsanbari.mp3",
        cevapSes: "sarkicevap2.mp3"
    },
    { 
        genelSoruSes: "sarki-sorusu.mp3",
        soruSes: "sezenaksu-haydigelbenimleol.mp3",
        cevapSes: "sarkicevap3.mp3"
    },
    { 
        genelSoruSes: "sarki-sorusu.mp3",
        soruSes: "hadise-askkacbedengiyer.mp3",
        cevapSes: "sarkicevap4.mp3"
    },
    { 
        genelSoruSes: "sarki-sorusu.mp3",
        soruSes: "muratboz-janti.mp3",
        cevapSes: "sarkicevap5.mp3"
    },
    { 
        genelSoruSes: "sarki-sorusu.mp3",
        soruSes: "sertaberener-rengarenk.mp3",
        cevapSes: "sarkicevap6.mp3"
    },
    { 
        genelSoruSes: "sarki-sorusu.mp3",
        soruSes: "handeyener-altdudak.mp3",
        cevapSes: "sarkicevap7.mp3"
    },
    { 
        genelSoruSes: "sarki-sorusu.mp3",
        soruSes: "serdarortac-poset.mp3",
        cevapSes: "sarkicevap8.mp3"
    },
    { 
        genelSoruSes: "sarki-sorusu.mp3",
        soruSes: "manifest-manifest.mp3",
        cevapSes: "sarkicevap9.mp3"
    }
]

let secilenSoru = null;
const urlParams = new URLSearchParams(window.location.search);
const kategori = urlParams.get('kategori') || 'kitap'; 

window.onload = function() {
    if(soruHavuzu[kategori]) {
        const kategoridekiSorular = soruHavuzu[kategori];
        const rastgeleIndeks = Math.floor(Math.random() * kategoridekiSorular.length);
        secilenSoru = kategoridekiSorular[rastgeleIndeks];
        
        document.getElementById('baslik').innerText = "Kategori: " + kategori.toUpperCase();
        document.getElementById('durum').innerText = "Soruyu ve süreyi başlatmak için dokunun.";
        document.getElementById('baslatBtn').style.display = "block";
    } else {
        document.getElementById('baslik').innerText = "Hata";
        document.getElementById('durum').innerText = "Geçersiz kategori.";
    }
};

function geriSayimiBaslat() {
    document.getElementById('durum').innerText = "Cevap için 15 saniyeniz var!";
    let kalanSure = 15;
    document.getElementById('süre').innerText = kalanSure;
    
    const geriSayim = setInterval(function() {
        kalanSure--;
        document.getElementById('süre').innerText = kalanSure;
        
        if (kalanSure <= 0) {
            clearInterval(geriSayim);
            document.getElementById('süre').innerText = "Süre Doldu!";
            document.getElementById('durum').innerText = "Cevap açıklanıyor...";
            
            // Cevap MP3'ünü oynat
            const cevapAudio = new Audio(secilenSoru.cevapSes);
            cevapAudio.play();
        }
    }, 1000);
}

function oyunuBaslat() {
    document.getElementById('baslatBtn').style.display = "none";
    document.getElementById('durum').innerText = "Soru hazırlanıyor...";
    
    if (secilenSoru.tur === "metin") {
        // Kitap ve Şiir Kategorisi (Normal akışında devam eder)
        const soruAudio = new Audio(secilenSoru.soruSes);
        soruAudio.play().catch(e => { document.getElementById('durum').innerText = "Soru sesi bulunamadı!"; });
        soruAudio.onended = function() {
            geriSayimiBaslat();
        };
        
    } else if (secilenSoru.tur === "muzik") {
        // --- YENİ ŞARKI KATEGORİSİ AKIŞI ---
        document.getElementById('durum').innerText = "Soru okunuyor...";
        
        // 1. ADIM: ElevenLabs'e okuttuğunuz genel "Şarkı kime ait?" sorusunu çalıyoruz
        // (Bunun için havuzunuza genelSoruSes adında bir dosya ekledik, aşağıda detayını anlattım)
        const genelSoru = new Audio(secilenSoru.genelSoruSes || "sarki-sorusu.mp3");
        genelSoru.play().catch(e => {
            document.getElementById('durum').innerText = "Giriş sorusu sesi bulunamadı!";
        });
        
        genelSoru.onended = function() {
            // 2. ADIM: Soru bittikten sonra ufak bir bekleme (Örn: 2 saniye / 2000 milisaniye)
            document.getElementById('durum').innerText = "Hazır olun, şarkı geliyor...";
            
            setTimeout(function() {
                // 3. ADIM: Bekleme süresi bitti, şarkı çalmaya başlıyor
                document.getElementById('durum').innerText = "Şarkı çalıyor...";
                const sarkiAudio = new Audio(secilenSoru.soruSes); // tarkan-simarik.mp3 gibi
                sarkiAudio.play().catch(e => {
                    document.getElementById('durum').innerText = "Şarkı dosyası bulunamadı!";
                    setTimeout(geriSayimiBaslat, 2000);
                });
                
                // 4. ADIM: Şarkı bittiğinde 15 saniyelik geri sayımı başlat
                sarkiAudio.onended = function() {
                    geriSayimiBaslat(); // Bu fonksiyon süre bitince otomatik 5. ADIM olan cevabı çalacak
                };
                
            }, 2000); // 2000 milisaniye = 2 saniyelik ufak bekleme süresi (Dilerseniz değiştirebilirsiniz)
        }
    }
}
</script>

</body>
</html>
