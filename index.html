<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Sesli Soru Sistemi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            padding: 30px;
            background: #1e1e1e;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #4caf50; font-size: 24px; }
        #durum { font-size: 18px; color: #bbb; margin-top: 20px; }
        #süre { font-size: 48px; color: #ff9800; font-weight: bold; margin: 20px 0; }
        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="baslik">Soru Yükleniyor...</h1>
    <div id="durum">Lütfen bekleyin...</div>
    <div id="süre"></div>
    
    <button id="baslatBtn" style="display:none;" onclick="oyunuBaslat()">Oyunu Başlat</button>
</div>

<script>

        { soruSes: "SESLER/KİTAP/Soru/kitapsoru2.mp3", cevapSes: "SESLER/KİTAP/Cevap/kitapcevap2.mp3" },
        { soruSes: "SESLER/KİTAP/Soru/kitapsoru3.mp3", cevapSes: "SESLER/KİTAP/Cevap/kitapcevap3.mp3" },
        { soruSes: "SESLER/KİTAP/Soru/kitapsoru4.mp3", cevapSes: "SESLER/KİTAP/Cevap/kitapcevap4.mp3" },
        { soruSes: "SESLER/KİTAP/Soru/kitapsoru5.mp3", cevapSes: "SESLER/KİTAP/Cevap/kitapcevap5.mp3" },
        { soruSes: "SESLER/KİTAP/Soru/kitapsoru6.mp3", cevapSes: "SESLER/KİTAP/Cevap/kitapcevap6.mp3" },
        { soruSes: "SESLER/KİTAP/Soru/kitapsoru7.mp3", cevapSes: "SESLER/KİTAP/Cevap/kitapcevap7.mp3" },
        { soruSes: "SESLER/KİTAP/Soru/kitapsoru8.mp3", cevapSes: "SESLER/KİTAP/Cevap/kitapcevap8.mp3" },
        { soruSes: "SESLER/KİTAP/Soru/kitapsoru9.mp3", cevapSes: "SESLER/KİTAP/Cevap/kitapcevap9.mp3" },
        { soruSes: "SESLER/KİTAP/Soru/kitapsoru10.mp3", cevapSes: "SESLER/KİTAP/Cevap/kitapcevap10.mp3" },
        { soruSes: "SESLER/KİTAP/Soru/kitapsoru11.mp3", cevapSes: "SESLER/KİTAP/Cevap/kitapcevap11.mp3" },
        { soruSes: "SESLER/KİTAP/Soru/kitapsoru12.mp3", cevapSes: "SESLER/KİTAP/Cevap/kitapcevap12.mp3" },
        { soruSes: "SESLER/KİTAP/Soru/kitapsoru13.mp3", cevapSes: "SESLER/KİTAP/Cevap/kitapcevap13.mp3" }
    ],
    siir: [
        { soruSes: "SESLER/ŞİİR/Soru/siirsoru1.mp3", cevapSes: "SESLER/ŞİİR/Cevap/siircevap1.mp3" },
        { soruSes: "SESLER/ŞİİR/Soru/siirsoru2.mp3", cevapSes: "SESLER/ŞİİR/Cevap/siircevap2.mp3" },
        { soruSes: "SESLER/ŞİİR/Soru/siirsoru3.mp3", cevapSes: "SESLER/ŞİİR/Cevap/siircevap3.mp3" },
        { soruSes: "SESLER/ŞİİR/Soru/siirsoru4.mp3", cevapSes: "SESLER/ŞİİR/Cevap/siircevap4.mp3" },
        { soruSes: "SESLER/ŞİİR/Soru/siirsoru5.mp3", cevapSes: "SESLER/ŞİİR/Cevap/siircevap5.mp3" },
        { soruSes: "SESLER/ŞİİR/Soru/siirsoru6.mp3", cevapSes: "SESLER/ŞİİR/Cevap/siircevap6.mp3" },
        { soruSes: "SESLER/ŞİİR/Soru/siirsoru7.mp3", cevapSes: "SESLER/ŞİİR/Cevap/siircevap7.mp3" },
        { soruSes: "SESLER/ŞİİR/Soru/siirsoru8.mp3", cevapSes: "SESLER/ŞİİR/Cevap/siircevap8.mp3" },
        { soruSes: "SESLER/ŞİİR/Soru/siirsoru9.mp3", cevapSes: "SESLER/ŞİİR/Cevap/siircevap9.mp3" }
    ],
    sarki: [
        { 
            genelSoruSes: "SESLER/ŞARKI/Soru/sarki-sorusu.mp3", 
            soruSes: "SESLER/ŞARKI/Şarkı/tarkan-simarik.mp3",       
            cevapSes: "SESLER/ŞARKI/Cevap/sarkicevap1.mp3"        
        },
        { 
            genelSoruSes: "SESLER/ŞARKI/Soru/sarki-sorusu.mp3",
            soruSes: "SESLER/ŞARKI/Şarkı/aleynatilki-senolsanbari.mp3",
            cevapSes: "SESLER/ŞARKI/Cevap/sarkicevap2.mp3"
        },
        { 
            genelSoruSes: "SESLER/ŞARKI/Soru/sarki-sorusu.mp3",
            soruSes: "SESLER/ŞARKI/Şarkı/sezenaksu-haydigelbenimleol.mp3",
            cevapSes: "SESLER/ŞARKI/Cevap/sarkicevap3.mp3"
        },
        { 
            genelSoruSes: "SESLER/ŞARKI/Soru/sarki-sorusu.mp3",
            soruSes: "SESLER/ŞARKI/Şarkı/hadise-askkacbedengiyer.mp3",

        {

        },
        {

            soruSes: "SESLER/ŞARKI/Şarkı/sertaberener-rengarenk.mp3",
            cevapSes: "SESLER/ŞARKI/Cevap/sarkicevap6.mp3"
        },
        { 
            genelSoruSes: "SESLER/ŞARKI/Soru/sarki-sorusu.mp3",
            soruSes: "SESLER/ŞARKI/Şarkı/handeyener-altdudak.mp3",
            cevapSes: "SESLER/ŞARKI/Cevap/sarkicevap7.mp3"
        },
        { 
            genelSoruSes: "SESLER/ŞARKI/Soru/sarki-sorusu.mp3",
            soruSes: "SESLER/ŞARKI/Şarkı/serdarortac-poset.mp3",
            cevapSes: "SESLER/ŞARKI/Cevap/sarkicevap8.mp3"
        },
        { 
            genelSoruSes: "SESLER/ŞARKI/Soru/sarki-sorusu.mp3",
            soruSes: "SESLER/ŞARKI/Şarkı/manifest-manifest.mp3",
            cevapSes: "SESLER/ŞARKI/Cevap/sarkicevap9.mp3"
        }
    ]
};

let secilenSoru = null;
const urlParams = new URLSearchParams(window.location.search);
const kategori = urlParams.get('kategori') || 'kitap'; 

window.onload = function() {
    // urlParams'tan gelen kategoriyi al ve küçük harfe çevir (Büyük-küçük harf hatalarını önler)
    let urlKategori = urlParams.get('kategori');
    if (urlKategori) {
        // Türkçe karakter ve büyük harf uyumluluğu için küçük harfe çeviriyoruz
        urlKategori = urlKategori.toLowerCase().replace('ı', 'i').replace('ş', 's');
    } else {
        urlKategori = 'kitap'; // Eğer linkte hiçbir şey yazmıyorsa varsayılan olarak kitap açılır
    }

    if(soruHavuzu[urlKategori]) {
        const kategoridekiSorular = soruHavuzu[urlKategori];
        const rastgeleIndeks = Math.floor(Math.random() * kategoridekiSorular.length);
        secilenSoru = kategoridekiSorular[rastgeleIndeks];
        
        document.getElementById('baslik').innerText = "Kategori: " + urlKategori.toUpperCase();
        document.getElementById('durum').innerText = "Soruyu ve süreyi başlatmak için dokunun.";
        document.getElementById('baslatBtn').style.display = "block";
    } else {
        document.getElementById('baslik').innerText = "Hata";
        document.getElementById('durum').innerText = "Geçersiz kategori. Lütfen QR kodu kontrol edin.";
    }
};

function geriSayimiBaslat() {
    document.getElementById('durum').innerText = "Cevap için 15 saniyeniz var!";
    let kalanSure = 15;
    document.getElementById('süre').innerText = kalanSure;
    
    const geriSayim = setInterval(function() {
        kalanSure--;
        document.getElementById('süre').innerText = kalanSure;
        
        if (kalanSure <= 0) {
            clearInterval(geriSayim);
            document.getElementById('süre').innerText = "Süre Doldu!";
            document.getElementById('durum').innerText = "Cevap açıklanıyor...";
            
            // Cevap MP3'ünü oynat
            const cevapAudio = new Audio(secilenSoru.cevapSes);
            cevapAudio.play().catch(e => {
                document.getElementById('durum').innerText = "Cevap dosyası bulunamadı!";
            });
        }
    }, 1000);
}

function oyunuBaslat() {
    document.getElementById('baslatBtn').style.display = "none";
    document.getElementById('durum').innerText = "Soru hazırlanıyor...";
    
    // Değişiklik: Kategori kontrolü doğrudan URL parametresine bağlandı
    if (kategori === "kitap" || kategori === "siir") {
        // Kitap ve Şiir Kategorisi Akışı
        const soruAudio = new Audio(secilenSoru.soruSes);
        soruAudio.play().catch(e => { document.getElementById('durum').innerText = "Soru sesi bulunamadı!"; });
        soruAudio.onended = function() {
            geriSayimiBaslat();
        };
        
    } else if (kategori === "sarki") {
        // Şarkı Kategorisi Akışı
        document.getElementById('durum').innerText = "Soru okunuyor...";
        
        // 1. ADIM: Soru klasöründeki genel şarkı sorusunu çal
        const genelSoru = new Audio(secilenSoru.genelSoruSes);
        genelSoru.play().catch(e => {
            document.getElementById('durum').innerText = "Giriş sorusu sesi bulunamadı!";
        });
        
        genelSoru.onended = function() {
            // 2. ADIM: 2 saniyelik bekleme süresi
            document.getElementById('durum').innerText = "Hazır olun, şarkı geliyor...";
            
            setTimeout(function() {
                // 3. ADIM: Şarkı klasöründeki müzik parçasını çal
                document.getElementById('durum').innerText = "Şarkı çalıyor...";
                const sarkiAudio = new Audio(secilenSoru.soruSes);
                sarkiAudio.play().catch(e => {
                    document.getElementById('durum').innerText = "Şarkı dosyası bulunamadı!";
                    setTimeout(geriSayimiBaslat, 2000);
                });
                
                // 4. ADIM: Şarkı bittiğinde geri sayımı başlat
                sarkiAudio.onended = function() {
                    geriSayimiBaslat();
                };
                
            }, 2000); // 2 saniyelik es
        }
    }
}
</script>

</body>
</html>
